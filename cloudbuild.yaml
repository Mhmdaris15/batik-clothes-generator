# Cloud Build config — builds the Docker image and deploys to Cloud Run.
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml .
#
# Or trigger from GitHub via Cloud Build trigger.

steps:
  # 1. Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/batik-generator:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/batik-generator:latest"
      - "."

  # 2. Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/batik-generator:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/batik-generator:latest"

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "batik-generator"
      - "--image"
      - "gcr.io/$PROJECT_ID/batik-generator:$SHORT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "300s"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "5"
      - "--set-env-vars"
      - "NODE_ENV=production"
      - "--update-secrets"
      - "GOOGLE_CLOUD_API_KEY=GOOGLE_CLOUD_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest"

images:
  - "gcr.io/$PROJECT_ID/batik-generator:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/batik-generator:latest"

options:
  logging: CLOUD_LOGGING_ONLY
